<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Facebook - log in or sign up</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="wrapper">

            <div class="main">

                <div class="logo">

                    <div id="logo">
                        <img src="./facebook-logo.svg">
                    </div>

                    <div id="text">
                        <h1>Facebook helps you connect and share with the people in your life</h1>
                    </div>

                </div>

                <div class="login-field">

                    <form class="form">

                        <div class="name-input">
                            <input type="text" id="name" placeholder="Email address or phone number" autocomplete="off">
                        </div>

                        <div class="password-input">
                            <input type="password" id="password" placeholder="Password" autocomplete="off">
                        </div>

                        <div class="login-btn">
                            <input type="button" value="Log in" id="login-btn">
                        </div>

                        <div class="forgot-password">
                            Forgot password?
                        </div>

                        <div class="border-line"></div>

                        <a href="https://facebook.com/">
                            <input type="button" value="Create New Account" id="create-account">
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </body>
</html>
